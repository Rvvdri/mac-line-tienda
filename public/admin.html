<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAC LINE - Panel de Administración</title>
    <link rel="stylesheet" href="admin-styles.css">
    <style>
        /* Fix para campos readonly */
        input[readonly] {
            background: rgba(0, 212, 255, 0.1) !important;
            color: #00d4ff !important;
            border: 1px solid rgba(0, 212, 255, 0.3) !important;
            font-weight: 700 !important;
        }
        
        /* SECCIÓN DE FOTOS MINIMALISTA */
        .imagenes-container {
            margin-top: 2rem;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        
        .imagenes-container h3 {
            color: #00d4ff;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .imagenes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
        }
        
        .imagen-upload-box {
            position: relative;
            aspect-ratio: 1;
            border: 2px dashed rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            transition: all 0.3s;
            overflow: hidden;
        }
        
        .imagen-upload-box:hover {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
        }
        
        .imagen-upload-box label {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #94a3b8;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .imagen-upload-box label::before {
            content: '+';
            font-size: 2rem;
            color: #00d4ff;
            margin-bottom: 0.25rem;
        }
        
        .imagen-upload-box input[type="file"] {
            display: none;
        }
        
        .imagen-preview {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
        }
        
        .imagen-preview.tiene-imagen {
            display: flex;
        }
        
        .imagen-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        /* Modal más ancho */
        .modal-edicion {
            max-width: 900px !important;
            max-height: 90vh !important;
            overflow-y: auto !important;
        }
        
        /* BOTÓN DE AGREGAR GRANDE Y BONITO */
        .btn-submit-grande {
            width: 100%;
            padding: 1.5rem 3rem;
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff 0%, #9333ea 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.4);
            margin-top: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-submit-grande:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0, 212, 255, 0.6);
        }
        
        .btn-submit-grande:active {
            transform: translateY(-1px);
        }
        
        /* TARJETA DE VENTA MEJORADA */
        .venta-card {
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.9) 0%, rgba(22, 33, 62, 0.9) 100%);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            transition: all 0.3s;
        }
        
        .venta-card:hover {
            border-color: #00d4ff;
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .venta-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }
        
        .venta-id {
            color: #00d4ff;
            font-size: 1.25rem;
            font-weight: 700;
        }
        
        .venta-fecha {
            color: #94a3b8;
            font-size: 0.875rem;
        }
        
        .venta-cliente {
            background: rgba(0, 212, 255, 0.05);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .venta-cliente h4 {
            color: #00d4ff;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }
        
        .cliente-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        
        .info-label {
            color: #94a3b8;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
        }
        
        .info-value {
            color: #e0e0e0;
            font-size: 0.9375rem;
            font-weight: 600;
        }
        
        .venta-productos {
            margin-bottom: 1.5rem;
        }
        
        .venta-productos h4 {
            color: #00d4ff;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }
        
        .producto-venta-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            margin-bottom: 0.75rem;
        }
        
        .producto-venta-nombre {
            color: #e0e0e0;
            font-weight: 600;
        }
        
        .producto-venta-detalles {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
        
        .producto-venta-precio {
            color: #00d4ff;
            font-weight: 700;
            font-size: 1.125rem;
        }
        
        .venta-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(147, 51, 234, 0.1) 100%);
            border-radius: 12px;
        }
        
        .venta-total-label {
            color: #00d4ff;
            font-size: 1.125rem;
            font-weight: 600;
        }
        
        .venta-total-valor {
            color: #00d4ff;
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        @media (max-width: 768px) {
            .cliente-info {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="admin-navbar">
        <div class="navbar-content">
            <h1>🖥️ MAC LINE - ADMINISTRACIÓN</h1>
            <div class="nav-buttons">
                <a href="index.html" class="btn-nav">← Volver a Tienda</a>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <aside class="sidebar">
            <div class="menu">
                <button class="menu-item active" onclick="mostrarSeccion('productos')">📦 Productos</button>
                <button class="menu-item" onclick="mostrarSeccion('agregar')">➕ Agregar Producto</button>
                <button class="menu-item" onclick="mostrarSeccion('ventas')">💰 Ventas</button>
                <button class="menu-item" onclick="mostrarSeccion('stock')">📊 Reporte Stock</button>
            </div>
        </aside>

        <main class="main-content">
            
            <!-- SECCIÓN PRODUCTOS -->
            <section id="productos-seccion" class="seccion activa">
                <h2>Gestión de Productos</h2>
                <div class="buscador">
                    <input type="text" id="buscarProducto" placeholder="Buscar producto..." onkeyup="filtrarProductosAdmin()">
                </div>
                <div class="tabla-wrapper">
                    <table class="tabla-productos" id="tablaProductos">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Imagen</th>
                                <th>Nombre</th>
                                <th>Categoría</th>
                                <th>Precio Original</th>
                                <th>Descuento</th>
                                <th>Precio Final</th>
                                <th>Stock</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="listaProductosAdmin"></tbody>
                    </table>
                </div>
            </section>

            <!-- SECCIÓN AGREGAR PRODUCTO -->
            <section id="agregar-seccion" class="seccion">
                <h2>➕ Agregar Nuevo Producto</h2>
                <form class="form-producto" onsubmit="agregarProducto(event)">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Nombre del Producto *</label>
                            <input type="text" id="nuevoNombre" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Categoría *</label>
                            <select id="nuevaCategoria" required>
                                <option value="">Seleccionar categoría</option>
                                <option value="celulares">📱 Celulares</option>
                                <option value="audifonos">🎧 Audífonos</option>
                                <option value="relojes">⌚ Relojes</option>
                                <option value="notebooks">💻 Computadores</option>
                                <option value="consolas">🎮 Consolas</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Precio Original (CLP) *</label>
                            <input type="number" id="nuevoPrecioOriginal" required min="0">
                        </div>
                        
                        <div class="form-group">
                            <label>Descuento (%) *</label>
                            <input type="number" id="nuevoDescuento" value="0" min="0" max="100" onchange="calcularPrecioFinalNuevo()">
                        </div>
                        
                        <div class="form-group">
                            <label>Precio Final (se calcula automáticamente)</label>
                            <input type="number" id="nuevoPrecio" readonly>
                        </div>
                        
                        <div class="form-group">
                            <label>Stock *</label>
                            <input type="number" id="nuevoStock" required min="0">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Descripción</label>
                        <textarea id="nuevaDescripcion" rows="4"></textarea>
                    </div>
                    
                    <!-- SECCIÓN DE FOTOS MINIMALISTA -->
                    <div class="imagenes-container">
                        <h3>📸 Imágenes del Producto</h3>
                        <div class="imagenes-grid">
                            <!-- Imagen Portada -->
                            <div class="imagen-upload-box">
                                <label for="nuevaImagenPortada">
                                    Portada
                                </label>
                                <input type="file" id="nuevaImagenPortada" accept="image/*" onchange="previsualizarImagen(this, 'previewPortadaNueva')">
                                <div class="imagen-preview" id="previewPortadaNueva"></div>
                            </div>
                            
                            <!-- 5 Imágenes Galería -->
                            <div class="imagen-upload-box">
                                <label for="nuevaImagen1">
                                    Galería 1
                                </label>
                                <input type="file" id="nuevaImagen1" accept="image/*" onchange="previsualizarImagen(this, 'previewNueva1')">
                                <div class="imagen-preview" id="previewNueva1"></div>
                            </div>
                            
                            <div class="imagen-upload-box">
                                <label for="nuevaImagen2">
                                    Galería 2
                                </label>
                                <input type="file" id="nuevaImagen2" accept="image/*" onchange="previsualizarImagen(this, 'previewNueva2')">
                                <div class="imagen-preview" id="previewNueva2"></div>
                            </div>
                            
                            <div class="imagen-upload-box">
                                <label for="nuevaImagen3">
                                    Galería 3
                                </label>
                                <input type="file" id="nuevaImagen3" accept="image/*" onchange="previsualizarImagen(this, 'previewNueva3')">
                                <div class="imagen-preview" id="previewNueva3"></div>
                            </div>
                            
                            <div class="imagen-upload-box">
                                <label for="nuevaImagen4">
                                    Galería 4
                                </label>
                                <input type="file" id="nuevaImagen4" accept="image/*" onchange="previsualizarImagen(this, 'previewNueva4')">
                                <div class="imagen-preview" id="previewNueva4"></div>
                            </div>
                            
                            <div class="imagen-upload-box">
                                <label for="nuevaImagen5">
                                    Galería 5
                                </label>
                                <input type="file" id="nuevaImagen5" accept="image/*" onchange="previsualizarImagen(this, 'previewNueva5')">
                                <div class="imagen-preview" id="previewNueva5"></div>
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-submit-grande">✅ Agregar Producto</button>
                </form>
            </section>

            <!-- SECCIÓN VENTAS MEJORADA -->
            <section id="ventas-seccion" class="seccion">
                <h2>💰 Historial de Ventas</h2>
                <div id="listaVentas"></div>
            </section>

            <!-- SECCIÓN REPORTE DE STOCK -->
            <section id="stock-seccion" class="seccion">
                <h2>📊 Reporte de Stock</h2>
                <div id="reporteStock"></div>
            </section>

        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
